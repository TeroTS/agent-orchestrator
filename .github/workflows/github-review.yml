name: github-review

on:
  workflow_run:
    workflows: ["make-all"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  github-review:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Capture PR metadata
        id: meta
        shell: bash
        run: |
          pr_number=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          head_sha=$(jq -r '.workflow_run.head_sha // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$pr_number" ] || [ -z "$head_sha" ]; then
            echo "Missing PR metadata in workflow_run payload." >&2
            exit 1
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout reviewed commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Capture review start timestamp
        id: review-start
        shell: bash
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run external PR reviewer
        id: reviewer
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: "true"
          claude_args: "--model global.anthropic.claude-sonnet-4-6 --max-turns 10"
          show_full_output: true
          prompt: |
            Review pull request #${{ steps.meta.outputs.pr_number }} in
            ${{ github.repository }} at commit
            ${{ steps.meta.outputs.head_sha }} for bugs, behavioral
            regressions, risky changes, and missing tests.

            The repository is already checked out at the PR head commit.
            Do not use Bash, gh, or other shell commands to discover pull
            request metadata. Use the PR context provided in this prompt and
            review the checked-out changes directly.

            Post review findings directly on the pull request. Focus on
            actionable issues that should block merge. Do not require an
            @claude mention to run.

      - name: Sync blocking review feedback to Linear
        if: steps.reviewer.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REVIEW_STARTED_AT: ${{ steps.review-start.outputs.started_at }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/github-review-sync.mjs

      - name: Fail on blocking review
        if: steps.reviewer.outcome == 'failure'
        shell: bash
        run: |
          echo "External review reported blocking findings." >&2
          exit 1
