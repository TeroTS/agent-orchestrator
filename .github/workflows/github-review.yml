name: github-review

on:
  workflow_run:
    workflows: ["make-all"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  github-review:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Capture PR metadata
        id: meta
        shell: bash
        run: |
          pr_number=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          head_sha=$(jq -r '.workflow_run.head_sha // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$pr_number" ] || [ -z "$head_sha" ]; then
            echo "Missing PR metadata in workflow_run payload." >&2
            exit 1
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout reviewed commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Fetch PR details
        id: pr-details
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
        run: |
          pr_json=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")

          pr_title=$(printf '%s' "$pr_json" | jq -r '.title // empty')
          pr_body=$(printf '%s' "$pr_json" | jq -r '.body // ""')
          pr_branch=$(printf '%s' "$pr_json" | jq -r '.head.ref // empty')
          pr_base_branch=$(printf '%s' "$pr_json" | jq -r '.base.ref // empty')
          pr_base_sha=$(printf '%s' "$pr_json" | jq -r '.base.sha // empty')
          pr_author=$(printf '%s' "$pr_json" | jq -r '.user.login // empty')

          if [ -z "$pr_title" ] || [ -z "$pr_branch" ] || [ -z "$pr_base_branch" ] || [ -z "$pr_base_sha" ] || [ -z "$pr_author" ]; then
            echo "Missing PR details from GitHub API." >&2
            exit 1
          fi

          echo "pr_title=$pr_title" >> "$GITHUB_OUTPUT"
          echo "pr_branch=$pr_branch" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=$pr_base_branch" >> "$GITHUB_OUTPUT"
          echo "pr_base_sha=$pr_base_sha" >> "$GITHUB_OUTPUT"
          echo "pr_author=$pr_author" >> "$GITHUB_OUTPUT"
          {
            echo "pr_body<<EOF"
            printf '%s\n' "$pr_body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR diff context
        shell: bash
        env:
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          PR_BASE_BRANCH: ${{ steps.pr-details.outputs.pr_base_branch }}
          PR_BASE_SHA: ${{ steps.pr-details.outputs.pr_base_sha }}
        run: |
          mkdir -p .claude-review
          git fetch --no-tags --depth=1 origin "$PR_BASE_BRANCH"
          git diff --name-status "$PR_BASE_SHA...$HEAD_SHA" > .claude-review/changed-files.txt
          git diff --stat "$PR_BASE_SHA...$HEAD_SHA" > .claude-review/diff-stat.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Capture review start timestamp
        id: review-start
        shell: bash
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run external PR reviewer
        id: reviewer
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: "true"
          claude_args: >-
            --model global.anthropic.claude-sonnet-4-6
            --max-turns 10
            --allowedTools "View,GlobTool,GrepTool,Write,Bash(gh pr review:*)"
          show_full_output: true
          prompt: |
            Review pull request #${{ steps.meta.outputs.pr_number }} in
            ${{ github.repository }} at commit
            ${{ steps.meta.outputs.head_sha }} for bugs, behavioral
            regressions, risky changes, and missing tests.

            PR title: ${{ steps.pr-details.outputs.pr_title }}
            PR author: ${{ steps.pr-details.outputs.pr_author }}
            PR branch: ${{ steps.pr-details.outputs.pr_branch }}
            PR base branch: ${{ steps.pr-details.outputs.pr_base_branch }}
            PR base SHA: ${{ steps.pr-details.outputs.pr_base_sha }}
            PR description:
            ${{ steps.pr-details.outputs.pr_body }}
            Changed files manifest: `.claude-review/changed-files.txt`
            Diff stat summary: `.claude-review/diff-stat.txt`

            The repository is already checked out at the PR head commit.
            Do not use Bash, gh, git, or other shell commands to discover pull
            request metadata. Do not try to confirm the PR number, title,
            body, author, or branch through shell commands or extra API
            lookups. Treat the prompt values as the source of truth. Use
            `.claude-review/changed-files.txt` and
            `.claude-review/diff-stat.txt` to determine what this pull
            request changes, and treat those files as the source of truth for
            PR scope. Do not infer PR scope from all files present in the
            checked-out repository; files not listed there are baseline
            context unless needed to understand a changed file.
            If you post a review, use only a single direct `gh pr review`
            command. Do not use pipes, redirects, subshells, command
            substitution, `cat`, or heredocs in Bash commands. If you need a
            long review body, write exactly one repo-local file named
            `pr-review.md` with file tools first, then call
            `gh pr review ... --body-file pr-review.md`.

            Post review findings directly on the pull request. Focus on
            actionable issues that should block merge. Do not require an
            @claude mention to run.

      - name: Sync blocking review feedback to Linear
        id: review-sync
        if: steps.reviewer.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REVIEW_STARTED_AT: ${{ steps.review-start.outputs.started_at }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/github-review-sync.mjs

      - name: Fail on blocking review
        if: steps.reviewer.outcome == 'failure' || steps.review-sync.outputs.blocking_review == 'true'
        shell: bash
        run: |
          echo "External review reported blocking findings." >&2
          exit 1
